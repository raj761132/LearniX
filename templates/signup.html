<!DOCTYPE html>
<html>
<head>
<title>LearniX Signup</title>
<style>
body{
    font-family: Arial;
    background: linear-gradient(to right,#2575fc,#6a11cb);
    text-align:center;
    color:white;
}

form{
    background:white;
    color:black;
    padding:30px;
    width:300px;
    margin:auto;
    border-radius:10px;
}
input,button{
    width:90%;
    padding:10px;
    margin:10px;
}
button{
    background:#2575fc;
    color:white;
    border:none;
}
</style>
</head>

<body>

<h1>🚀 Join LearniX</h1>

{% with messages = get_flashed_messages() %}
{% for msg in messages %}
<p style="color:yellow;">{{msg}}</p>
{% endfor %}
{% endwith %}

<form method="POST">
<input name="username" placeholder="Username" required>
<input name="password" type="password" placeholder="Password" required>
<button type="submit">Signup</button>
</form>

<a href="/login" style="color:white;">Already have account?</a>

</body>
</html>
